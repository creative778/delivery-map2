<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cloud Delivery Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet (map) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
  body{font-family:Arial;margin:0;background:#f4f4f4}
  #map{height:350px}
  .container{padding:15px}
  input,textarea,button{padding:8px;margin:5px;width:95%}
  button{background:#000;color:#fff;border:none;cursor:pointer}
  .card{background:#fff;padding:10px;margin:10px 0;border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
  .hidden{display:none}
</style>
</head>

<body>

<div class="container">
  <h2>Cloud Delivery Manager</h2>

  <!-- ===== Login form ===== -->
  <div id="loginBox">
    <input type="text" id="email" placeholder="Email (e.g. admin@gmail.com)">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- ===== Main panel (hidden until login) ===== -->
  <div id="panel" class="hidden">

    <h3>Add Delivery</h3>
    <input type="text" id="mobile" placeholder="Mobile Number">
    <input type="text" id="customerName" placeholder="Customer Name">
    <input type="text" id="address" placeholder="Address">
    <button onclick="saveDelivery()">Save</button>

    <hr>

    <h3>Single Search</h3>
    <input type="text" id="singleSearch" placeholder="Mobile Number">
    <button onclick="singleSearch()">Search</button>

    <hr>

    <h3>Multiple Search (max 50 numbers, comma‑separated)</h3>
    <textarea id="multiSearch" rows="3"
              placeholder="017xxx,018xxx,…"></textarea>
    <button onclick="multiSearch()">Search &amp; Sort</button>

    <div id="result"></div>
  </div>
</div>

<!-- ===== Map (hidden until logged in) ===== -->
<div id="map" class="hidden"></div>

<script type="module">
  // ---------- Firebase SDK imports ----------
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getFirestore, setDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

  // ---------- Your Firebase project config ----------
  const firebaseConfig = {
    apiKey: "AIzaSyA82YWF574aCnkYdwN0airAcFl-_M21sHM",
    authDomain: "delivery-map-pro.firebaseapp.com",
    projectId: "delivery-map-pro",
    storageBucket: "delivery-map-pro.firebasestorage.app",
    messagingSenderId: "544868009171",
    appId: "1:544868009171:web:e416002a340d96400b8026",
    measurementId: "G-NQX3MRD5HP"
  };

  // ---------- Initialise Firebase ----------
  const app   = initializeApp(firebaseConfig);
  const db    = getFirestore(app);
  const auth  = getAuth(app);
  // expose auth globally – handy for console debugging
  window.auth = auth;

  // ---------- Initialise Leaflet ----------
  const map = L.map('map').setView([23.8103, 90.4125], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    .addTo(map);
  let marker; // will hold the temporary map marker

  map.on('click', e => {
    if (marker) map.removeLayer(marker);
    marker = L.marker(e.latlng).addTo(map);
  });

  // -----------------------------------------------------------------
  // ========================= UI FUNCTIONS ==========================
  // -----------------------------------------------------------------

  // ---- Login -------------------------------------------------------
  window.login = async function () {
    try {
      await signInWithEmailAndPassword(
        auth,
        document.getElementById("email").value.trim(),
        document.getElementById("password").value
      );
      // hide login, show panel + map
      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("panel").classList.remove("hidden");
      document.getElementById("map").classList.remove("hidden");
    } catch (e) {
      alert("Login Failed – please check email/password.");
      console.error(e);
    }
  };

  // ---- Save a delivery ---------------------------------------------
  window.saveDelivery = async function () {
    if (!marker) {
      alert("Click on the map to set the delivery location first.");
      return;
    }
    const mobile = document.getElementById("mobile").value.trim();
    if (!mobile) {
      alert("Mobile number is required.");
      return;
    }
    const data = {
      mobile: mobile,
      customerName: document.getElementById("customerName").value.trim(),
      address: document.getElementById("address").value.trim(),
      lat: marker.getLatLng().lat,
      lng: marker.getLatLng().lng
    };
    await setDoc(doc(db, "deliveries", mobile), data);
    alert("Saved to Cloud");
  };

  // ---- Single search ------------------------------------------------
  window.singleSearch = async function () {
    const mobile = document.getElementById("singleSearch").value.trim();
    if (!mobile) {
      alert("Enter a mobile number.");
      return;
    }
    const docSnap = await getDoc(doc(db, "deliveries", mobile));
    if (!docSnap.exists()) {
      document.getElementById("result").innerHTML = "<p>No data found.</p>";
      return;
    }
    showOnMap(docSnap.data());
    document.getElementById("result").innerHTML = `<p>Found delivery for ${docSnap.data().customerName}</p>`;
  };

  // ---- Multiple search (max 50) -------------------------------------
  window.multiSearch = async function () {
    const raw = document.getElementById("multiSearch").value;
    const numbers = raw.split(",")
                       .map(n => n.trim())
                       .filter(n => n !== "")
                       .slice(0, 50);                // enforce the limit

    if (numbers.length === 0) {
      alert("Enter at least one mobile number.");
      return;
    }

    const unmatched = [];
    const found = [];

    for (const num of numbers) {
      const d = await getDoc(doc(db, "deliveries", num));
      if (d.exists()) {
        found.push(d.data());
      } else {
        unmatched.push(num);
      }
    }

    // Get the device's current GPS location for distance sorting
    navigator.geolocation.getCurrentPosition(pos => {
      const { latitude, longitude } = pos.coords;
      found.sort((a, b) => {
        const da = distance(latitude, longitude, a.lat, a.lng);
        const db = distance(latitude, longitude, b.lat, b.lng);
        return da - db;
      });

      const resultDiv = document.getElementById("result");
      resultDiv.innerHTML = "";

      found.forEach((f, i) => {
        resultDiv.innerHTML += `
          <div class="card">
            <strong>${i + 1}. ${f.customerName} (${f.mobile})</strong><br>
            ${f.address}<br>
            <button onclick="route(${f.lat},${f.lng})">Route</button>
          </div>`;
      });

      if (unmatched.length) {
        resultDiv.innerHTML += `
          <div class="card">
            <b>This All Number Looks New, No Old Map Found:</b><br>
            ${unmatched.join(", ")}
          </div>`;
      }
    }, err => {
      // If geolocation fails, just show the unsorted list
      alert("Could not get current location – showing unsorted results.");
      const resultDiv = document.getElementById("result");
      resultDiv.innerHTML = found.map((f, i) => `
        <div class="card">
          <strong>${i + 1}. ${f.customerName} (${f.mobile})</strong><br>
          ${f.address}<br>
          <button onclick="route(${f.lat},${f.lng})">Route</button>
        </div>`).join("");
    });
  };

  // ---- Show a single delivery on the map ---------------------------
  function showOnMap(data) {
    map.setView([data.lat, data.lng], 15);
    if (marker) map.removeLayer(marker);
    marker = L.marker([data.lat, data.lng]).addTo(map);
  }

  // ---- Open Google Maps routing ------------------------------------
  window.route = function (lat, lng) {
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`);
  };

  // ---- Haversine distance (km) ------------------------------------
  function distance(lat1, lon1, lat2, lon2) {
    const R = 6371; // Earth's radius in km
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) ** 2 +
              Math.cos(lat1 * Math.PI / 180) *
              Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon / 2) ** 2;
    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
  }
</script>

</body>
</html>
