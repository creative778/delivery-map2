<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cloud Delivery Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet for the map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
  /* --------------------------------------------------------------
     Global layout & colours – dark mode support
     -------------------------------------------------------------- */
  body{
    font-family:Arial,Helvetica,sans-serif;
    margin:0;
    background:#f4f4f4;
    color:#222;
    transition:background .3s,color .3s;
  }
  .dark{
    background:#111;
    color:#ddd;
  }
  .topbar{
    background:#000;
    color:#fff;
    padding:12px 15px;
    text-align:center;
    font-size:1.2rem;
    position:relative;
  }
  .topbar .toggle{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:1.4rem;
  }
  .container{
    padding:15px;
  }
  input,textarea,select,button{
    width:100%;
    max-width:420px;
    padding:9px;
    margin:6px 0;
    border:1px solid #ccc;
    border-radius:4px;
    box-sizing:border-box;
    font-size:1rem;
  }
  button{
    background:#000;
    color:#fff;
    border:none;
    cursor:pointer;
    transition:background .2s;
  }
  button:hover{background:#333;}
  .smallbtn{
    width:auto;
    padding:6px 12px;
    margin:3px;
    font-size:0.9rem;
  }
  .card{
    background:#fff;
    padding:12px;
    margin:12px 0;
    border-radius:6px;
    box-shadow:0 2px 6px rgba(0,0,0,.08);
    line-height:1.4;
  }
  .dark .card{background:#222;}
  .hidden{display:none;}
  #map{height:380px;margin-top:10px;}
  /* --------------------------------------------------------------
     Toast notification
     -------------------------------------------------------------- */
  #toast{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#4caf50;
    color:#fff;
    padding:12px 18px;
    border-radius:4px;
    box-shadow:0 2px 6px rgba(0,0,0,.2);
    opacity:0;
    transition:opacity .3s;
    z-index:1000;
  }
  .dark #toast{background:#81c784;}
</style>
</head>

<body>

<div class="topbar">
  Cloud Delivery Manager
  <span class="toggle" onclick="toggleDark()">🌙</span>
</div>

<div class="container">

  <!-- ===================== LOGIN ===================== -->
  <div id="loginBox">
    <h3>Login</h3>
    <input type="text" id="email" placeholder="Email (e.g. admin@gmail.com)">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- ===================== MAIN PANEL ===================== -->
  <div id="panel" class="hidden">

    <button onclick="logout()" class="smallbtn">Logout</button>
    <button onclick="changePassword()" class="smallbtn">Change Password</button>
    <button onclick="toggleLiveTracking()" class="smallbtn" id="trackBtn">Start Live‑Tracking</button>

    <!-- ==== Add / Update Delivery ==== -->
    <h3>Add / Update Delivery</h3>
    <input type="text" id="mobile" placeholder="Mobile Number">
    <input type="text" id="customerName" placeholder="Customer Name">
    <input type="text" id="address" placeholder="Address">
    <input type="text" id="tags" placeholder="Tags (comma‑separated)">
    <textarea id="note" rows="2" placeholder="Note (optional)"></textarea>

    <button onclick="saveDelivery()">Save New</button>
    <button onclick="updateDelivery()">Update</button>
    <button onclick="deleteDelivery()">Delete</button>
    <button onclick="detectGPS()">Auto Detect GPS</button>

    <hr>

    <!-- ==== Single Search ==== -->
    <h3>Search by Mobile</h3>
    <input type="text" id="singleSearch" placeholder="Enter Mobile">
    <button onclick="singleSearch()">Search</button>

    <div id="result"></div>

    <hr>

    <!-- ==== Multiple Search ==== -->
    <h3>Multiple Search (max 50, comma‑separated)</h3>
    <textarea id="multiSearch" rows="3"
              placeholder="017xxx,018xxx,…"></textarea>
    <button onclick="multiSearch()">Search &amp; Sort</button>

    <hr>

    <!-- ==== Data Tools ==== -->
    <h3>Data Tools</h3>
    <button onclick="exportCSV()" class="smallbtn">Export CSV</button>
    <button onclick="backupData()" class="smallbtn">Backup JSON</button>
    <input type="file" onchange="restoreData(event)" class="smallbtn">
    <button onclick="clearAll()" class="smallbtn">Clear All</button>

  </div>
</div>

<!-- ===================== MAP ===================== -->
<div id="map" class="hidden"></div>

<!-- Toast for feedback -->
<div id="toast"></div>

<script type="module">
/* --------------------------------------------------------------
   Firebase imports
   -------------------------------------------------------------- */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
  getFirestore,
  collection,
  doc,
  setDoc,
  getDoc,
  getDocs,
  deleteDoc,
  updateDoc,
  onSnapshot,
  query,
  where,
  orderBy,
  limit
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  updatePassword
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

/* --------------------------------------------------------------
   Firebase config (same project you already have)
   -------------------------------------------------------------- */
const firebaseConfig = {
  apiKey: "AIzaSyA82YWF574aCnkYdwN0airAcFl-_M21sHM",
  authDomain: "delivery-map-pro.firebaseapp.com",
  projectId: "delivery-map-pro",
  storageBucket: "delivery-map-pro.firebasestorage.app",
  messagingSenderId: "544868009171",
  appId: "1:544868009171:web:e416002a340d96400b8026",
  measurementId: "G-NQX3MRD5HP"
};

const app   = initializeApp(firebaseConfig);
const db    = getFirestore(app);
const auth  = getAuth(app);
window.auth = auth;   // expose for console debugging

/* --------------------------------------------------------------
   Leaflet map & marker handling
   -------------------------------------------------------------- */
let map, myMarker;                 // marker for the current user (when adding/updating)
let liveWatchId = null;            // ID returned by navigator.geolocation.watchPosition
const liveMarkers = new Map();     // <mobile, Leaflet marker> for everyone with live data

function initMap(){
  map = L.map('map').setView([23.8103,90.4125],12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    .addTo(map);

  // Click to set a static delivery location (used by Save/Update)
  map.on('click', e=>{
    if(myMarker) map.removeLayer(myMarker);
    myMarker = L.marker(e.latlng).addTo(map);
  });

  // Listen to real‑time updates of *any* delivery that has liveLat/liveLng
  const deliveriesRef = collection(db, "deliveries");
  onSnapshot(deliveriesRef, snap=>{
    snap.docChanges().forEach(change=>{
      const data = change.doc.data();
      const mobile = data.mobile;
      // Remove marker if the doc is deleted or live data cleared
      if(change.type==="removed" || !data.liveLat || !data.liveLng){
        const old = liveMarkers.get(mobile);
        if(old){ map.removeLayer(old); liveMarkers.delete(mobile); }
        return;
      }
      // Add / update live marker
      const latLng = [data.liveLat, data.liveLng];
      if(liveMarkers.has(mobile)){
        liveMarkers.get(mobile).setLatLng(latLng);
      }else{
        const lm = L.marker(latLng,{icon:liveIcon()})
          .bindPopup(`<b>${data.customerName||''}</b><br>${mobile}`)
          .addTo(map);
        liveMarkers.set(mobile,lm);
      }
    });
  });
}

/* Custom icon for live‑tracking people */
function liveIcon(){
  return L.icon({
    iconUrl:"https://cdn-icons-png.flaticon.com/512/684/684908.png",
    iconSize:[30,30],
    iconAnchor:[15,30]
  });
}

/* --------------------------------------------------------------
   UI helpers
   -------------------------------------------------------------- */
function toggleDark(){
  document.body.classList.toggle('dark');
}

/* Simple toast */
function showToast(msg){
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.opacity = '1';
  setTimeout(()=>{ toast.style.opacity='0'; }, 2500);
}

/* --------------------------------------------------------------
   AUTH – login / logout / change password
   -------------------------------------------------------------- */
window.login = async function(){
  const email = document.getElementById('email').value.trim();
  const pwd   = document.getElementById('password').value;
  try{
    await signInWithEmailAndPassword(auth,email,pwd);
    // UI switch
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('panel').classList.remove('hidden');
    document.getElementById('map').classList.remove('hidden');
    initMap();
  }catch(e){
    alert('Login failed – check email/password.');
    console.error(e);
  }
};

window.logout = async function(){
  await signOut(auth);
  location.reload();
};

window.changePassword = async function(){
  const newPass = prompt('Enter new password:');
  if(!newPass) return;
  try{
    await updatePassword(auth.currentUser, newPass);
    alert('Password changed!');
  }catch(e){
    alert('Could not change password – please re‑login then try again.');
    console.error(e);
  }
};

/* --------------------------------------------------------------
   LIVE‑TRACKING – start / stop watchPosition
   -------------------------------------------------------------- */
window.toggleLiveTracking = function(){
  const btn = document.getElementById('trackBtn');
  if(liveWatchId===null){
    // start watching
    if(!navigator.geolocation){
      alert('Geolocation not supported on this device.');
      return;
    }
    liveWatchId = navigator.geolocation.watchPosition(async pos=>{
      const {latitude,longitude} = pos.coords;
      // update map marker for *this* user
      if(myMarker) map.removeLayer(myMarker);
      myMarker = L.marker([latitude,longitude],{icon:liveIcon()})
        .bindPopup('You (Live)')
        .addTo(map);
      map.setView([latitude,longitude],15);
      // push the live position to Firestore (under the mobile you entered)
      const mobile = document.getElementById('mobile').value.trim();
      if(mobile){
        const ref = doc(db,'deliveries',mobile);
        await setDoc(ref,{
          mobile,
          liveLat: latitude,
          liveLng: longitude,
          liveTimestamp: Date.now()
        },{merge:true});
      }
    }, err=>alert('Live‑tracking error: '+err.message),{enableHighAccuracy:true});
    btn.textContent = 'Stop Live‑Tracking';
    btn.style.background = '#c62828';
  }else{
    // stop watching
    navigator.geolocation.clearWatch(liveWatchId);
    liveWatchId = null;
    btn.textContent = 'Start Live‑Tracking';
    btn.style.background = '';
    // optionally clear live data from Firestore
    const mobile = document.getElementById('mobile').value.trim();
    if(mobile){
      const ref = doc(db,'deliveries',mobile);
      await updateDoc(ref,{liveLat:deleteField(),liveLng:deleteField(),liveTimestamp:deleteField()});
    }
  }
};

/* --------------------------------------------------------------
   DELIVERY CRUD
   -------------------------------------------------------------- */
function deliveryRef(mobile){ return doc(db,'deliveries',mobile); }

window.saveDelivery = async function(){
  if(!myMarker){
    alert('Click on the map to set a location first.');
    return;
  }
  const mobile = document.getElementById('mobile').value.trim();
  if(!mobile){ alert('Mobile number required.'); return; }

  const data = {
    mobile,
    customerName: document.getElementById('customerName').value.trim(),
    address:       document.getElementById('address').value.trim(),
    tags:          (document.getElementById('tags').value || '').split(',')
                     .map(t=>t.trim()).filter(t=>t),
    note:          document.getElementById('note').value.trim(),
    lat:           myMarker.getLatLng().lat,
    lng:           myMarker.getLatLng().lng,
    createdAt:     Date.now(),
    count:         1
  };
  await setDoc(deliveryRef(mobile), data);
  showToast('✅ Delivery saved');
};

window.updateDelivery = async function(){
  const mobile = document.getElementById('mobile').value.trim();
  if(!mobile){ alert('Mobile number required.'); return; }

  const ref = deliveryRef(mobile);
  const snap = await getDoc(ref);
  if(!snap.exists()){
    alert('Delivery not found.');
    return;
  }

  const updates = {
    customerName: document.getElementById('customerName').value.trim(),
    address:       document.getElementById('address').value.trim(),
    tags:          (document.getElementById('tags').value || '').split(',')
                     .map(t=>t.trim()).filter(t=>t),
    note:          document.getElementById('note').value.trim(),
    updatedAt:     Date.now(),
    count:         (snap.data().count||0)+1
  };
  // If a new marker is placed, update lat/lng too
  if(myMarker){
    updates.lat = myMarker.getLatLng().lat;
    updates.lng = myMarker.getLatLng().lng;
  }
  await updateDoc(ref, updates);
  showToast('✅ Delivery updated');
};

window.deleteDelivery = async function(){
  const mobile = document.getElementById('mobile').value.trim();
  if(!mobile){ alert('Mobile number required.'); return; }
  if(!confirm('Delete this delivery?')) return;
  await deleteDoc(deliveryRef(mobile));
  showToast('🗑️ Delivery deleted');
};

/* --------------------------------------------------------------
   GPS detection – one‑time set of your current position
   -------------------------------------------------------------- */
window.detectGPS = function(){
  if(!navigator.geolocation){
    alert('Geolocation not supported.');
    return;
  }
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude,longitude} = pos.coords;
    if(myMarker) map.removeLayer(myMarker);
    myMarker = L.marker([latitude,longitude]).addTo(map);
    map.setView([latitude,longitude],15);
  }, err=>alert('GPS error: '+err.message));
};

/* --------------------------------------------------------------
   SEARCH – single
   -------------------------------------------------------------- */
window.singleSearch = async function(){
  const mobile = document.getElementById('singleSearch').value.trim();
  if(!mobile){ alert('Enter a mobile number.'); return; }
  const snap = await getDoc(deliveryRef(mobile));
  if(!snap.exists()){
    document.getElementById('result').innerHTML = '<p>No data found.</p>';
    return;
  }
  const data = snap.data();
  showOnMap(data);
  renderSingleCard(data);
};

function showOnMap(data){
  map.setView([data.lat, data.lng],15);
  if(myMarker) map.removeLayer(myMarker);
  myMarker = L.marker([data.lat, data.lng]).addTo(map);
}

/* Render a single‑delivery card (includes distance & route) */
function renderSingleCard(d){
  const container = document.getElementById('result');
  if(!navigator.geolocation){
    container.innerHTML = buildCard(d,'N/A');
    return;
  }
  navigator.geolocation.getCurrentPosition(pos=>{
    const dist = distance(pos.coords.latitude,pos.coords.longitude,d.lat,d.lng)
                  .toFixed(2);
    container.innerHTML = buildCard(d,dist);
  },()=>{ container.innerHTML = buildCard(d,'N/A'); });
}

/* --------------------------------------------------------------
   SEARCH – multiple (max 50)
   -------------------------------------------------------------- */
window.multiSearch = async function(){
  const raw = document.getElementById('multiSearch').value;
  const nums = raw.split(',').map(n=>n.trim()).filter(n=>n).slice(0,50);
  if(nums.length===0){ alert('Enter at least one mobile number.'); return; }

  const found = [], notFound = [];

  for(const num of nums){
    const snap = await getDoc(deliveryRef(num));
    if(snap.exists()){
      found.push(snap.data());
    }else{
      notFound.push(num);
    }
  }

  // Get current position for distance sorting
  if(!navigator.geolocation){
    renderMultiCards(found,notFound,null);
    return;
  }
  navigator.geolocation.getCurrentPosition(pos=>{
    renderMultiCards(found,notFound,{lat:pos.coords.latitude,lng:pos.coords.longitude});
  },()=>{ renderMultiCards(found,notFound,null); });
};

function renderMultiCards(found,notFound,curPos){
  const container = document.getElementById('result');
  container.innerHTML = '';

  // Sort by distance if we have a position
  if(curPos){
    found.sort((a,b)=> distance(curPos.lat,curPos.lng,a.lat,a.lng)
                      - distance(curPos.lat,curPos.lng,b.lat,b.lng));
  }

  found.forEach((d,i)=>{
    const dist = curPos ? distance(curPos.lat,curPos.lng,d.lat,d.lng).toFixed(2) : 'N/A';
    container.innerHTML += `
      <div class="card">
        <b>${i+1}. ${d.customerName || ''} (${d.mobile})</b><br>
        ${d.address}<br>
        <b>Tags:</b> ${d.tags ? d.tags.join(', ') : ''}<br>
        <b>Note:</b> ${d.note || ''}<br>
        <b>Count:</b> ${d.count||0}<br>
        <b>Distance:</b> ${dist} km<br>
        <button onclick="route(${d.lat},${d.lng})">Route</button>
      </div>`;
  });

  if(notFound.length){
    container.innerHTML += `
      <div class="card"><b>Numbers not found:</b><br>${notFound.join(', ')}</div>`;
  }
}

/* --------------------------------------------------------------
   Routing helper
   -------------------------------------------------------------- */
window.route = function(lat,lng){
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`);
};

/* --------------------------------------------------------------
   Data export / backup / restore / clear
   -------------------------------------------------------------- */
window.exportCSV = async function(){
  const snap = await getDocs(collection(db,'deliveries'));
  let csv = "Mobile,Customer Name,Address,Tags,Note,Count,Lat,Lng\n";
  snap.forEach(docSnap=>{
    const d = docSnap.data();
    const tags = d.tags ? d.tags.join('|') : '';
    csv += `${d.mobile},${d.customerName||''},${d.address||''},${tags},${d.note||''},${d.count||0},${d.lat||''},${d.lng||''}\n`;
  });
  download('deliveries.csv',csv);
};

window.backupData = async function(){
  const snap = await getDocs(collection(db,'deliveries'));
  const obj = {};
  snap.forEach(docSnap=>{ obj[docSnap.id]=docSnap.data(); });
  download('deliveries_backup.json',JSON.stringify(obj, null, 2));
};

window.restoreData = async function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async ev=>{
    try{
      const data = JSON.parse(ev.target.result);
      for(const [id,docData] of Object.entries(data)){
        await setDoc(doc(db,'deliveries',id),docData);
      }
      alert('Restore completed.');
    }catch(err){
      alert('Invalid JSON file.');
      console.error(err);
    }
  };
  reader.readAsText(file);
};

window.clearAll = async function(){
  if(!confirm('Delete ALL delivery data? This cannot be undone.')) return;
  const snap = await getDocs(collection(db,'deliveries'));
  for(const docSnap of snap){
    await deleteDoc(docSnap.ref);
  }
  alert('All data cleared.');
};

function download(name, text){
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text],{type:'text/plain'}));
  a.download = name;
  a.click();
}

/* --------------------------------------------------------------
   Distance calculation (Haversine)
   -------------------------------------------------------------- */
function distance(lat1,lon1,lat2,lon2){
  const R = 6371; // km
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
            Math.sin(dLon/2)**2;
  return R * (2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

/* --------------------------------------------------------------
   Card builder (used by single & multi searches)
   -------------------------------------------------------------- */
function buildCard(d,dist){
  return `
    <div class="card">
      <b>Customer:</b> ${d.customerName||''}<br>
      <b>Mobile:</b> ${d.mobile}<br>
      <b>Address:</b> ${d.address}<br>
      <b>Tags:</b> ${d.tags ? d.tags.join(', ') : ''}<br>
      <b>Note:</b> ${d.note||''}<br>
      <b>Count:</b> ${d.count||0}<br>
      <b>Distance:</b> ${dist} km<br>
      <button onclick="route(${d.lat},${d.lng})">Route</button>
    </div>`;
}

/* --------------------------------------------------------------
   Auto‑login handling (if the user is already authenticated)
   -------------------------------------------------------------- */
if(auth.currentUser){
  document.getElementById('loginBox').classList.add('hidden');
  document.getElementById('panel').classList.remove('hidden');
  document.getElementById('map').classList.remove('hidden');
  initMap();
}
</script>

</body>
</html>
