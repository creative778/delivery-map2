<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Delivery Map Ultimate – Firebase Edition</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet (map) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
/* --------------------------------------------------------------
   Global layout & dark‑mode
   -------------------------------------------------------------- */
body{
  font-family:Arial,Helvetica,sans-serif;
  margin:0;
  background:#f4f4f4;
  color:#222;
  transition:background .3s,color .3s;
}
.dark{
  background:#111;
  color:#ddd;
}
.topbar{
  background:#000;
  color:#fff;
  padding:12px 15px;
  text-align:center;
  font-size:1.2rem;
  position:relative;
}
.topbar .toggle{
  position:absolute;
  right:15px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:1.4rem;
}
.container{
  max-width:800px;
  margin:auto;
  padding:15px;
}
input,textarea,select,button{
  width:100%;
  max-width:420px;
  padding:9px;
  margin:6px 0;
  border:1px solid #ccc;
  border-radius:4px;
  box-sizing:border-box;
  font-size:1rem;
}
button{
  background:#222;
  color:#fff;
  border:none;
  cursor:pointer;
  transition:background .2s;
}
button:hover{background:#444;}
.smallbtn{
  width:auto;
  padding:6px 12px;
  margin:3px;
  font-size:0.9rem;
}
.card{
  background:#fff;
  padding:12px;
  margin:12px 0;
  border-radius:6px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
  line-height:1.4;
  word-break:break-word;
}
.dark .card{background:#222;}
.hidden{display:none;}
#map{height:350px;margin-top:10px;}
/* --------------------------------------------------------------
   Toast notification (slide‑in)
   -------------------------------------------------------------- */
#toast{
  position:fixed;
  bottom:20px;
  right:-300px;               /* start hidden */
  background:#4caf50;
  color:#fff;
  padding:12px 18px;
  border-radius:4px;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
  opacity:0;
  transition:right .4s, opacity .4s;
  z-index:1000;
}
.dark #toast{background:#81c784;}
.toast-show{
  right:20px;
  opacity:1;
}
/* --------------------------------------------------------------
   Bouncing live‑icon
   -------------------------------------------------------------- */
@keyframes bounce{
  0%   {transform:translateY(0);}
  30%  {transform:translateY(-12px);}
  50%  {transform:translateY(0);}
  70%  {transform:translateY(-6px);}
  100% {transform:translateY(0);}
}
.leaflet-marker-icon.bouncing{animation:bounce 1s infinite;}
@media (max-width:500px){
  input,textarea,select,button{max-width:100%;}
  .topbar{font-size:1rem;}
}
</style>
</head>

<body>

<div class="topbar">
  Delivery Map Ultimate – Firebase Edition
  <span class="toggle" onclick="toggleDark()">🌙</span>
</div>

<div class="container">

  <!-- ===================== LOGIN ===================== -->
  <div id="loginBox">
    <h3>Login</h3>
    <input type="text" id="username" placeholder="Email (e.g. admin@gmail.com)">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- ===================== MAIN PANEL ===================== -->
  <div id="panel" class="hidden">

    <button onclick="logout()" class="smallbtn">Logout</button>
    <button onclick="changePassword()" class="smallbtn">Change Password</button>
    <button onclick="toggleLiveTracking()" class="smallbtn" id="trackBtn">Start Live‑Tracking</button>

    <!-- ==== Add / Update Delivery ==== -->
    <h3>Add / Update Delivery</h3>

    <input type="text" id="mobile" placeholder="Mobile Number (unique ID)">
    <input type="text" id="address" placeholder="Full Address">
    <select id="status">
      <option>Pending</option>
      <option>Delivered</option>
      <option>Returned</option>
    </select>
    <input type="text" id="note" placeholder="Note (optional)">

    <button onclick="saveData()">Save New</button>
    <button onclick="updateData()">Update Status</button>
    <button onclick="deleteData()">Delete</button>
    <button onclick="detectGPS()">Auto Detect GPS</button>

    <hr>

    <!-- ==== Search by Mobile ==== -->
    <h3>Search by Mobile</h3>
    <input type="text" id="searchMobile" placeholder="Enter Mobile">
    <button onclick="searchData()">Search</button>

    <div id="result"></div>

    <hr>

    <!-- ==== Data Tools ==== -->
    <h3>Data Tools</h3>
    <button onclick="exportCSV()" class="smallbtn">Export CSV</button>
    <button onclick="backupData()" class="smallbtn">Backup JSON</button>
    <input type="file" onchange="restoreData(event)" class="smallbtn">
    <button onclick="clearAll()" class="smallbtn">Clear All Data</button>

  </div>
</div>

<!-- ===================== MAP ===================== -->
<div id="map" class="hidden"></div>

<!-- Toast for feedback -->
<div id="toast"></div>

<script type="module">
/* --------------------------------------------------------------
   Firebase SDK imports
   -------------------------------------------------------------- */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-analytics.js";
import {
  getFirestore,
  collection,
  doc,
  setDoc,
  getDoc,
  getDocs,
  deleteDoc,
  updateDoc,
  onSnapshot,
  deleteField
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  updatePassword
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

/* --------------------------------------------------------------
   👉 YOUR FIREBASE CONFIG – paste from your console
   -------------------------------------------------------------- */
const firebaseConfig = {
  apiKey: "AIzaSyA82YWF574aCnkYdwN0airAcFl-_M21sHM",
  authDomain: "delivery-map-pro.firebaseapp.com",
  projectId: "delivery-map-pro",
  storageBucket: "delivery-map-pro.firebasestorage.app",
  messagingSenderId: "544868009171",
  appId: "1:544868009171:web:e416002a340d96400b8026",
  measurementId: "G-NQX3MRD5HP"
};

/* --------------------------------------------------------------
   Initialise Firebase + Analytics
   -------------------------------------------------------------- */
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);      // optional analytics (no personal data)
const db = getFirestore(app);
const auth = getAuth(app);
window.auth = auth;   // expose for console debugging

/* --------------------------------------------------------------
   UI helpers
   -------------------------------------------------------------- */
function toggleDark(){ document.body.classList.toggle('dark'); }

function showToast(msg){
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('toast-show');
  setTimeout(()=>{ toast.classList.remove('toast-show'); },3000);
}

/* --------------------------------------------------------------
   Geolocation permission helper (nice UX)
   -------------------------------------------------------------- */
async function ensureGeolocationPermission(){
  if (!navigator.geolocation){
    alert('Geolocation not supported on this device.');
    return false;
  }
  if (navigator.permissions){
    try{
      const r = await navigator.permissions.query({name:'geolocation'});
      if (r.state === 'denied'){
        alert('Geolocation is blocked for this site. Please enable it in browser settings and reload.');
        return false;
      }
    }catch(e){ /* ignore – fallback to normal request */ }
  }
  return true;
}

/* --------------------------------------------------------------
   AUTH – login / logout / change password
   -------------------------------------------------------------- */
window.login = async function(){
  const email = document.getElementById('username').value.trim();
  const pwd   = document.getElementById('password').value;
  try{
    await signInWithEmailAndPassword(auth,email,pwd);
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('panel').classList.remove('hidden');
    document.getElementById('map').classList.remove('hidden');
    initMap();
    showToast('✅ Logged in');
  }catch(e){
    alert('Login failed – check email/password.');
    console.error(e);
  }
};

window.logout = async function(){
  await signOut(auth);
  location.reload();
};

window.changePassword = async function(){
  const newPass = prompt('Enter new password:');
  if(!newPass) return;
  try{
    await updatePassword(auth.currentUser,newPass);
    alert('Password changed!');
    showToast('✅ Password updated');
  }catch(e){
    alert('Could not change password – please re‑login then try again.');
    console.error(e);
  }
};

/* --------------------------------------------------------------
   MAP & marker handling
   -------------------------------------------------------------- */
let map, marker;          // marker for the current delivery (add / update)
let liveWatchId = null;   // ID from geolocation.watchPosition
const liveMarkers = new Map(); // mobile → Leaflet marker (live tracking)

function initMap(){
  map = L.map('map').setView([23.8103,90.4125],12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    .addTo(map);

  // Click → static location for Save / Update
  map.on('click', e=>{
    if(marker) map.removeLayer(marker);
    marker = L.marker(e.latlng,{draggable:true}).addTo(map);
  });

  // Listen for live‑tracking updates from any delivery that has liveLat/liveLng
  const deliveriesRef = collection(db,'deliveries');
  onSnapshot(deliveriesRef, snap=>{
    snap.docChanges().forEach(change=>{
      const data = change.doc.data();
      const mobile = data.mobile;
      if(change.type==="removed" || !data.liveLat || !data.liveLng){
        const old = liveMarkers.get(mobile);
        if(old){ map.removeLayer(old); liveMarkers.delete(mobile); }
        return;
      }
      const latLng = [data.liveLat, data.liveLng];
      if(liveMarkers.has(mobile)){
        liveMarkers.get(mobile).setLatLng(latLng);
      }else{
        const lm = L.marker(latLng,{icon:liveIcon()})
          .bindPopup(`<b>${data.customerName||''}</b><br>${mobile}`)
          .addTo(map);
        lm.getElement().classList.add('bouncing');
        liveMarkers.set(mobile,lm);
      }
    });
  });
}

/* Icon for live‑tracking */
function liveIcon(){
  return L.icon({
    iconUrl:"https://cdn-icons-png.flaticon.com/512/684/684908.png",
    iconSize:[30,30],
    iconAnchor:[15,30]
  });
}

/* --------------------------------------------------------------
   Live‑Tracking (pushes your position to Firestore)
   -------------------------------------------------------------- */
window.toggleLiveTracking = async function(){
  const btn = document.getElementById('trackBtn');

  if(liveWatchId===null){
    const ok = await ensureGeolocationPermission();
    if(!ok) return;

    liveWatchId = navigator.geolocation.watchPosition(async pos=>{
      const {latitude,longitude} = pos.coords;
      // Show your own moving marker
      if(marker) map.removeLayer(marker);
      marker = L.marker([latitude,longitude],{icon:liveIcon()})
        .bindPopup('You (Live)')
        .addTo(map);
      map.setView([latitude,longitude],15);

      // Write live coordinates under the mobile you typed
      const mobile = document.getElementById('mobile').value.trim();
      if(mobile){
        const ref = doc(db,'deliveries',mobile);
        await setDoc(ref,{
          mobile,
          liveLat: latitude,
          liveLng: longitude,
          liveTimestamp: Date.now()
        },{merge:true});
      }
    }, err=>alert('Live‑tracking error: '+err.message),
    {enableHighAccuracy:true});

    btn.textContent = 'Stop Live‑Tracking';
    btn.style.background = '#c62828';
    showToast('📍 Live‑tracking started');
  }else{
    navigator.geolocation.clearWatch(liveWatchId);
    liveWatchId = null;
    btn.textContent = 'Start Live‑Tracking';
    btn.style.background = '';

    // Optionally clear live data for current mobile
    const mobile = document.getElementById('mobile').value.trim();
    if(mobile){
      const ref = doc(db,'deliveries',mobile);
      await updateDoc(ref,{liveLat:deleteField(),liveLng:deleteField(),liveTimestamp:deleteField()});
    }
    showToast('🛑 Live‑tracking stopped');
  }
};

/* --------------------------------------------------------------
   CRUD – Delivery (add / update / delete)
   -------------------------------------------------------------- */
function deliveryRef(mobile){ return doc(db,'deliveries',mobile); }

window.saveData = async function(){
  if(!marker){
    alert('Click on the map to set a location first.');
    return;
  }
  const mobile  = document.getElementById('mobile').value.trim();
  const address = document.getElementById('address').value.trim();
  if(!mobile || !address){
    alert('Mobile & address are required.');
    return;
  }

  const snap = await getDoc(deliveryRef(mobile));
  if(snap.exists()){
    alert('Number already exists – use Update instead.');
    return;
  }

  const latlng = marker.getLatLng();
  const data = {
    mobile,
    address,
    status: document.getElementById('status').value,
    note:   document.getElementById('note').value.trim(),
    lat:    latlng.lat,
    lng:    latlng.lng,
    createdAt: Date.now(),
    count: 1,
    customerName: ''   // you can expand later
  };
  try{
    await setDoc(deliveryRef(mobile), data);
    showToast('✅ Delivery saved');
  }catch(e){
    alert('Error saving delivery.');
    console.error(e);
  }
};

window.updateData = async function(){
  const mobile = document.getElementById('mobile').value.trim();
  if(!mobile){ alert('Mobile required.'); return; }

  const ref = deliveryRef(mobile);
  const snap = await getDoc(ref);
  if(!snap.exists()){
    alert('Delivery not found.');
    return;
  }

  const updates = {
    status: document.getElementById('status').value,
    note:   document.getElementById('note').value.trim(),
    updatedAt: Date.now(),
    count: (snap.data().count||0)+1
  };
  if(marker){
    const ll = marker.getLatLng();
    updates.lat = ll.lat;
    updates.lng = ll.lng;
  }
  try{
    await updateDoc(ref, updates);
    showToast('✅ Delivery updated');
  }catch(e){
    alert('Error updating delivery.');
    console.error(e);
  }
};

window.deleteData = async function(){
  const mobile = document.getElementById('mobile').value.trim();
  if(!mobile){ alert('Mobile required.'); return; }
  if(!confirm('Delete this delivery?')) return;
  try{
    await deleteDoc(deliveryRef(mobile));
    showToast('🗑️ Delivery deleted');
  }catch(e){
    alert('Error deleting delivery.');
    console.error(e);
  }
};

/* --------------------------------------------------------------
   Auto‑detect GPS (one‑time)
   -------------------------------------------------------------- */
window.detectGPS = async function(){
  const ok = await ensureGeolocationPermission();
  if(!ok) return;

  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude,longitude} = pos.coords;
    if(marker) map.removeLayer(marker);
    marker = L.marker([latitude,longitude]).addTo(map);
    map.setView([latitude,longitude],15);
    showToast('📍 GPS location set');
  }, err=>alert('GPS error: '+err.message));
};

/* --------------------------------------------------------------
   Search by mobile (single)
   -------------------------------------------------------------- */
window.searchData = async function(){
  const mobile = document.getElementById('searchMobile').value.trim();
  if(!mobile){ alert('Enter a mobile number.'); return; }
  const snap = await getDoc(deliveryRef(mobile));
  if(!snap.exists()){
    document.getElementById('result').innerHTML = '<p>No data found.</p>';
    return;
  }
  const info = snap.data();

  // Fill the form so the user can edit if needed
  document.getElementById('mobile').value = mobile;
  document.getElementById('address').value = info.address;
  document.getElementById('status').value = info.status;
  document.getElementById('note').value   = info.note || '';

  // Show on map
  map.setView([info.lat,info.lng],15);
  if(marker) map.removeLayer(marker);
  marker = L.marker([info.lat,info.lng]).addTo(map);

  // Distance from user (if geolocation allowed)
  const resultDiv = document.getElementById('result');
  if(!navigator.geolocation){
    resultDiv.innerHTML = buildCard(info,'N/A');
    return;
  }
  navigator.geolocation.getCurrentPosition(pos=>{
    const dist = distance(pos.coords.latitude,pos.coords.longitude,info.lat,info.lng).toFixed(2);
    resultDiv.innerHTML = buildCard(info,dist);
  },()=>{ resultDiv.innerHTML = buildCard(info,'N/A'); });
};

/* --------------------------------------------------------------
   Data export / backup / restore / clear‑all
   -------------------------------------------------------------- */
window.exportCSV = async function(){
  const snap = await getDocs(collection(db,'deliveries'));
  let csv = "Mobile,Address,Status,Note,Count,Lat,Lng\n";
  snap.forEach(docSnap=>{
    const d = docSnap.data();
    const note = d.note ? `"${d.note.replace(/"/g,'""')}"` : '';
    csv += `${docSnap.id},${d.address},${d.status},${note},${d.count||0},${d.lat||''},${d.lng||''}\n`;
  });
  download('deliveries.csv',csv);
};

window.backupData = async function(){
  const snap = await getDocs(collection(db,'deliveries'));
  const obj = {};
  snap.forEach(docSnap=>{ obj[docSnap.id]=docSnap.data(); });
  download('deliveries_backup.json',JSON.stringify(obj, null, 2));
};

window.restoreData = async function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async ev=>{
    try{
      const data = JSON.parse(ev.target.result);
      for(const [id,docData] of Object.entries(data)){
        await setDoc(doc(db,'deliveries',id),docData);
      }
      alert('Restore completed.');
      showToast('✅ Data restored');
    }catch(err){
      alert('Invalid JSON file.');
      console.error(err);
    }
  };
  reader.readAsText(file);
};

window.clearAll = async function(){
  if(!confirm('Delete ALL delivery data? This cannot be undone.')) return;
  const snap = await getDocs(collection(db,'deliveries'));
  for(const docSnap of snap){
    await deleteDoc(docSnap.ref);
  }
  alert('All data cleared.');
  showToast('🗑️ All data cleared');
};

function download(name, text){
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text],{type:'text/plain'}));
  a.download = name;
  a.click();
}

/* --------------------------------------------------------------
   Haversine distance (km)
   -------------------------------------------------------------- */
function distance(lat1,lon1,lat2,lon2){
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
            Math.sin(dLon/2)**2;
  return R * (2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

/* --------------------------------------------------------------
   Card builder (used in search results)
   -------------------------------------------------------------- */
function buildCard(d,dist){
  return `
    <div class="card">
      <b>Address:</b> ${d.address}<br>
      <b>Status:</b> ${d.status}<br>
      <b>Note:</b> ${d.note || ''}<br>
      <b>Count:</b> ${d.count||0}<br>
      <b>Distance:</b> ${dist} km<br>
      <button class="smallbtn" onclick="route(${d.lat},${d.lng})">Navigate →</button>
    </div>`;
}

/* --------------------------------------------------------------
   Routing – open Google Maps with origin → destination
   -------------------------------------------------------------- */
window.route = function(lat,lng){
  if(!navigator.geolocation){
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`);
    return;
  }
  navigator.geolocation.getCurrentPosition(pos=>{
    const origin = `${pos.coords.latitude},${pos.coords.longitude}`;
    const dest   = `${lat},${lng}`;
    window.open(`https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}`);
  },()=>{ // fallback if geolocation denied at this moment
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`);
  });
};

/* --------------------------------------------------------------
   Auto‑login handling (if user already signed in)
   -------------------------------------------------------------- */
if(auth.currentUser){
  document.getElementById('loginBox').classList.add('hidden');
  document.getElementById('panel').classList.remove('hidden');
  document.getElementById('map').classList.remove('hidden');
  initMap();
}
</script>

</body>
</html>
