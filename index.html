<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cloud Delivery Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet (map) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
  body{font-family:Arial;margin:0;background:#f4f4f4;color:#000}
  .dark{background:#111;color:#fff}
  .dark button{background:#444}
  .dark .card{background:#222}
  .topbar{background:#000;color:#fff;padding:10px;text-align:center}
  .toggle{float:right;cursor:pointer}
  #map{height:350px}
  .container{padding:15px}
  input,textarea,select,button{padding:8px;margin:5px;width:95%}
  button{background:#000;color:#fff;border:none;cursor:pointer}
  .smallbtn{width:auto;padding:6px 10px;margin:3px}
  .card{background:#fff;padding:10px;margin:10px 0;border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
  .hidden{display:none}
</style>
</head>

<body>

<div class="topbar">
  Cloud Delivery Manager
  <span class="toggle" onclick="toggleDark()">🌙</span>
</div>

<div class="container">

  <!-- ===================== LOGIN ===================== -->
  <div id="loginBox">
    <h3>Login</h3>
    <input type="text" id="email" placeholder="Email (e.g. admin@gmail.com)">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- ===================== MAIN PANEL ===================== -->
  <div id="panel" class="hidden">

    <button onclick="logout()" class="smallbtn">Logout</button>
    <button onclick="changePassword()" class="smallbtn">Change Password</button>

    <!-- ==== Add / Update Delivery ==== -->
    <h3>Add / Update Delivery</h3>
    <input type="text" id="mobile" placeholder="Mobile Number">
    <input type="text" id="customerName" placeholder="Customer Name">
    <input type="text" id="address" placeholder="Address">
    <select id="status">
      <option>Pending</option>
      <option>Delivered</option>
      <option>Returned</option>
    </select>
    <input type="text" id="note" placeholder="Note">
    <button onclick="saveDelivery()">Save New</button>
    <button onclick="updateDelivery()">Update Status</button>
    <button onclick="deleteDelivery()">Delete</button>
    <button onclick="detectGPS()">Auto Detect GPS</button>

    <hr>

    <!-- ==== Single Search ==== -->
    <h3>Search by Mobile</h3>
    <input type="text" id="singleSearch" placeholder="Enter Mobile">
    <button onclick="singleSearch()">Search</button>

    <div id="result"></div>

    <hr>

    <!-- ==== Multiple Search ==== -->
    <h3>Multiple Search (max 50, comma‑separated)</h3>
    <textarea id="multiSearch" rows="3"
              placeholder="017xxx,018xxx,…"></textarea>
    <button onclick="multiSearch()">Search &amp; Sort</button>

    <hr>

    <!-- ==== Data Tools ==== -->
    <h3>Data Tools</h3>
    <button onclick="exportCSV()" class="smallbtn">Export CSV</button>
    <button onclick="backupData()" class="smallbtn">Backup JSON</button>
    <input type="file" onchange="restoreData(event)" class="smallbtn">
    <button onclick="clearAll()" class="smallbtn">Clear All Data</button>

  </div>
</div>

<!-- ===================== MAP ===================== -->
<div id="map" class="hidden"></div>

<script type="module">
/* --------------------------------------------------------------
   Firebase SDK imports
   -------------------------------------------------------------- */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
  getFirestore,
  collection,
  doc,
  setDoc,
  getDoc,
  getDocs,
  deleteDoc,
  updateDoc,
  query
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  updatePassword
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

/* --------------------------------------------------------------
   Your Firebase config (same as before)
   -------------------------------------------------------------- */
const firebaseConfig = {
  apiKey: "AIzaSyA82YWF574aCnkYdwN0airAcFl-_M21sHM",
  authDomain: "delivery-map-pro.firebaseapp.com",
  projectId: "delivery-map-pro",
  storageBucket: "delivery-map-pro.firebasestorage.app",
  messagingSenderId: "544868009171",
  appId: "1:544868009171:web:e416002a340d96400b8026",
  measurementId: "G-NQX3MRD5HP"
};

/* --------------------------------------------------------------
   Initialise Firebase
   -------------------------------------------------------------- */
const app   = initializeApp(firebaseConfig);
const db    = getFirestore(app);
const auth  = getAuth(app);
window.auth = auth;                         // expose for console testing

/* --------------------------------------------------------------
   Initialise Leaflet map
   -------------------------------------------------------------- */
let map, marker;
function initMap(){
  map = L.map('map').setView([23.8103,90.4125],12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  map.on('click', e => {
    if (marker) map.removeLayer(marker);
    marker = L.marker(e.latlng).addTo(map);
  });
}

/* --------------------------------------------------------------
   UI helpers
   -------------------------------------------------------------- */
function toggleDark(){
  document.body.classList.toggle('dark');
}

/* --------------------------------------------------------------
   AUTH
   -------------------------------------------------------------- */
window.login = async function(){
  const email = document.getElementById("email").value.trim();
  const pwd   = document.getElementById("password").value;
  try{
    await signInWithEmailAndPassword(auth, email, pwd);
    // hide login, show panel + map
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("panel").classList.remove("hidden");
    document.getElementById("map").classList.remove("hidden");
    initMap();
  }catch(e){
    alert("Login Failed – please check email/password.");
    console.error(e);
  }
};

window.logout = async function(){
  await signOut(auth);
  // clear UI state
  location.reload();
};

window.changePassword = async function(){
  const newPass = prompt("Enter new password:");
  if(!newPass) return;
  try{
    await updatePassword(auth.currentUser, newPass);
    alert("Password changed!");
  }catch(e){
    alert("Could not change password – you may need to re‑login.");
    console.error(e);
  }
};

/* --------------------------------------------------------------
   DELIVERY CRUD
   -------------------------------------------------------------- */
async function getDeliveryDoc(mobile){
  return doc(db, "deliveries", mobile);
}

/* Save new delivery (creates doc) */
window.saveDelivery = async function(){
  if(!marker){
    alert("Click on the map to set a location first.");
    return;
  }
  const mobile = document.getElementById("mobile").value.trim();
  if(!mobile){
    alert("Mobile number required.");
    return;
  }
  const deliveryRef = await getDeliveryDoc(mobile);
  const snapshot = await getDoc(deliveryRef);
  if(snapshot.exists()){
    alert("A delivery with that mobile already exists.");
    return;
  }
  const data = {
    mobile: mobile,
    customerName: document.getElementById("customerName").value.trim(),
    address: document.getElementById("address").value.trim(),
    status: document.getElementById("status").value,
    note: document.getElementById("note").value.trim(),
    lat: marker.getLatLng().lat,
    lng: marker.getLatLng().lng,
    count: 1,
    createdAt: Date.now()
  };
  await setDoc(deliveryRef, data);
  alert("Delivery saved!");
};

/* Update status (and increment count) */
window.updateDelivery = async function(){
  const mobile = document.getElementById("mobile").value.trim();
  if(!mobile){
    alert("Mobile number required.");
    return;
  }
  const deliveryRef = await getDeliveryDoc(mobile);
  const snapshot = await getDoc(deliveryRef);
  if(!snapshot.exists()){
    alert("Delivery not found.");
    return;
  }
  const newStatus = document.getElementById("status").value;
  const newNote   = document.getElementById("note").value.trim();
  await updateDoc(deliveryRef, {
    status: newStatus,
    note:   newNote,
    count:  (snapshot.data().count||0) + 1,
    updatedAt: Date.now()
  });
  alert("Delivery updated!");
};

/* Delete a delivery */
window.deleteDelivery = async function(){
  const mobile = document.getElementById("mobile").value.trim();
  if(!mobile){
    alert("Mobile number required.");
    return;
  }
  if(!confirm("Are you sure you want to delete this delivery?")) return;
  const deliveryRef = await getDeliveryDoc(mobile);
  await deleteDoc(deliveryRef);
  alert("Deleted.");
};

/* --------------------------------------------------------------
   GPS detection
   -------------------------------------------------------------- */
window.detectGPS = function(){
  if(!navigator.geolocation){
    alert("Geolocation not supported.");
    return;
  }
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude, longitude} = pos.coords;
    if(marker) map.removeLayer(marker);
    marker = L.marker([latitude, longitude]).addTo(map);
    map.setView([latitude, longitude], 15);
  }, err=>alert("Could not get location."));
};

/* --------------------------------------------------------------
   SEARCH – single
   -------------------------------------------------------------- */
window.singleSearch = async function(){
  const mobile = document.getElementById("singleSearch").value.trim();
  if(!mobile){
    alert("Enter a mobile number.");
    return;
  }
  const deliveryRef = await getDeliveryDoc(mobile);
  const snap = await getDoc(deliveryRef);
  if(!snap.exists()){
    document.getElementById("result").innerHTML = "<p>No data found.</p>";
    return;
  }
  const data = snap.data();
  showOnMap(data);
  renderSingleResult(data);
};

function showOnMap(data){
  map.setView([data.lat, data.lng], 15);
  if(marker) map.removeLayer(marker);
  marker = L.marker([data.lat, data.lng]).addTo(map);
}

/* Render the single‑search card (with distance, routing, etc.) */
function renderSingleResult(data){
  if(!navigator.geolocation){
    document.getElementById("result").innerHTML = buildCard(data, "N/A");
    return;
  }
  navigator.geolocation.getCurrentPosition(pos=>{
    const dist = distance(
      pos.coords.latitude, pos.coords.longitude,
      data.lat, data.lng
    ).toFixed(2);
    document.getElementById("result").innerHTML = buildCard(data, dist);
  },()=>{ // fallback if GPS fails
    document.getElementById("result").innerHTML = buildCard(data, "N/A");
  });
}

/* Card template used by both single & multi search */
function buildCard(data, dist){
  const d = data;
  return `
    <div class="card">
      <b>Customer:</b> ${d.customerName || "—"}<br>
      <b>Mobile:</b> ${d.mobile}<br>
      <b>Address:</b> ${d.address}<br>
      <b>Status:</b> ${d.status}<br>
      <b>Note:</b> ${d.note}<br>
      <b>Count:</b> ${d.count || 0}<br>
      <b>Distance:</b> ${dist} km<br>
      <button onclick="route(${d.lat},${d.lng})">Route</button>
    </div>`;
}

/* --------------------------------------------------------------
   SEARCH – multiple (max 50)
   -------------------------------------------------------------- */
window.multiSearch = async function(){
  const raw = document.getElementById("multiSearch").value;
  const numbers = raw.split(",")
                     .map(n=>n.trim())
                     .filter(n=>n!=="")
                     .slice(0,50);
  if(numbers.length===0){
    alert("Enter at least one mobile number.");
    return;
  }

  const found = [];
  const unmatched = [];

  for(const num of numbers){
    const ref = await getDeliveryDoc(num);
    const snap = await getDoc(ref);
    if(snap.exists()){
      found.push(snap.data());
    }else{
      unmatched.push(num);
    }
  }

  // Get current position for distance sorting
  if(!navigator.geolocation){
    renderMultiResults(found, unmatched, null);
    return;
  }
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude, longitude} = pos.coords;
    found.sort((a,b)=> distance(latitude, longitude, a.lat, a.lng)
                       - distance(latitude, longitude, b.lat, b.lng));
    renderMultiResults(found, unmatched, {latitude, longitude});
  },()=>{ // fallback if GPS fails
    renderMultiResults(found, unmatched, null);
  });
};

function renderMultiResults(found, unmatched, curPos){
  const container = document.getElementById("result");
  container.innerHTML = "";

  found.forEach((d,i)=>{
    const dist = curPos
      ? distance(curPos.latitude, curPos.longitude, d.lat, d.lng).toFixed(2)
      : "N/A";
    container.innerHTML += `
      <div class="card">
        <b>${i+1}. ${d.customerName || "—"} (${d.mobile})</b><br>
        ${d.address}<br>
        <b>Status:</b> ${d.status}<br>
        <b>Note:</b> ${d.note}<br>
        <b>Count:</b> ${d.count||0}<br>
        <b>Distance:</b> ${dist} km<br>
        <button onclick="route(${d.lat},${d.lng})">Route</button>
      </div>`;
  });

  if(unmatched.length){
    container.innerHTML += `
      <div class="card"><b>Numbers not found:</b><br>${unmatched.join(", ")}</div>`;
  }
}

/* --------------------------------------------------------------
   ROUTING helper
   -------------------------------------------------------------- */
window.route = function(lat,lng){
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`);
};

/* --------------------------------------------------------------
   DISTANCE (Haversine)
   -------------------------------------------------------------- */
function distance(lat1,lon1,lat2,lon2){
  const R = 6371; // km
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180) *
            Math.cos(lat2*Math.PI/180) *
            Math.sin(dLon/2)**2;
  return R * (2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

/* --------------------------------------------------------------
   DATA TOOLS – CSV / JSON backup / restore / clear all
   -------------------------------------------------------------- */
window.exportCSV = async function(){
  const docs = await getDocs(collection(db, "deliveries"));
  let csv = "Mobile,Customer Name,Address,Status,Note,Count,Lat,Lng\n";
  docs.forEach(docSnap=>{
    const d = docSnap.data();
    csv += `${d.mobile},${d.customerName||""},${d.address||""},${d.status||""},${d.note||""},${d.count||0},${d.lat||""},${d.lng||""}\n`;
  });
  download("deliveries.csv", csv);
};

window.backupData = async function(){
  const docs = await getDocs(collection(db, "deliveries"));
  const obj = {};
  docs.forEach(docSnap=>{
    obj[docSnap.id] = docSnap.data();
  });
  download("deliveries_backup.json", JSON.stringify(obj, null, 2));
};

window.restoreData = async function(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async e=>{
    try{
      const data = JSON.parse(e.target.result);
      const batch = []; // simple loop (no Firestore batch to keep code short)
      for(const [id,docData] of Object.entries(data)){
        await setDoc(doc(db, "deliveries", id), docData);
      }
      alert("Restore completed!");
    }catch(err){
      alert("Invalid JSON file.");
      console.error(err);
    }
  };
  reader.readAsText(file);
};

window.clearAll = async function(){
  if(!confirm("Delete ALL delivery data? This cannot be undone.")) return;
  const docs = await getDocs(collection(db, "deliveries"));
  for(const docSnap of docs){
    await deleteDoc(docSnap.ref);
  }
  alert("All data cleared.");
};

/* Helper to trigger file download */
function download(name, text){
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([text], {type: "text/plain"}));
  a.download = name;
  a.click();
}

/* --------------------------------------------------------------
   Auto‑login UI handling
   -------------------------------------------------------------- */
if(auth.currentUser){
  // user already logged in from a previous session
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("panel").classList.remove("hidden");
  document.getElementById("map").classList.remove("hidden");
  initMap();
}
</script>

</body>
</html>
